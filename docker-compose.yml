# Переменные: создайте файл .env рядом с этим compose (см. .env.example) или экспортируйте в shell.
# Важно для боевого домена: APP_URL (https://…), NEXT_PUBLIC_API_URL (часто /api), SANCTUM_STATEFUL_DOMAINS.

services:
  postgres:
    image: postgres:16-alpine
    container_name: library_postgres
    environment:
      POSTGRES_DB: library_catalog
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_catalog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - library_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:3000,127.0.0.1,127.0.0.1:8000,::1}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: library_catalog
      DB_USERNAME: library_user
      DB_PASSWORD: library_password
      # HS256 (Lcobucci): минимум 32 байта в строке ключа; старый дефолт был короче и давал JWTException
      JWT_SECRET: ${JWT_SECRET:-LibraryCatalog_dev_jwt_hmac_key_at_least_32_bytes_long_ok}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - library_net

  webface:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: library_webface
    volumes:
      - ./frontend:/app
    environment:
      # Относительный /api = тот же хост в браузере, что и фронт (удобно для любого домена за Nginx)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - library_net

  proxy-nginx:
    build:
      context: ./proxy-nginx
      dockerfile: Dockerfile
    container_name: library_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - webface
    networks:
      - library_net

volumes:
  postgres_data:

networks:
  library_net:
    driver: bridge
