# Docker DNS: резолв имён при запросе (нужен для proxy_pass с переменными)
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP без редиректа на HTTPS (редирект можно включить позже)
server {
    listen 80;
    server_name _;
    include /etc/nginx/conf.d/snippets/catalog-locations.conf;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/catalogbooks.crt;
    ssl_certificate_key /etc/nginx/ssl/catalogbooks.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/conf.d/snippets/catalog-locations.conf;
}
